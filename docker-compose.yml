version: "3.8"

services:
  hardhat:
    build: ./hardhat
    container_name: hardhat-node
    command: sh -c "npx hardhat compile && npx hardhat node --hostname 0.0.0.0 --port 8545"
    ports:
      - "127.0.0.1:8545:8545"   # bind to localhost ONLY (important)
    volumes:
      # - ./hardhat:/app
      - ./hardhat/artifacts:/app/artifacts
    networks:
      - pocnet
    restart: unless-stopped

  deployer:
    build: ./hardhat
    depends_on:
      - hardhat
    networks:
      - pocnet
    volumes:
      - ./hardhat:/app
    command: >
      sh -lc "
        echo 'Waiting for Hardhat RPC...' &&
        node -e \"
          const url='http://hardhat:8545';
          const body=JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_chainId',params:[]});
          const headers={'Content-Type':'application/json'};
          const loop=async()=>{ 
            for(;;){
              try{
                const r=await fetch(url,{method:'POST',headers,body});
                const j=await r.json();
                if(j.result){ console.log('RPC ready'); process.exit(0); }
              }catch(e){}
              await new Promise(res=>setTimeout(res,1000));
            }
          };
          loop();
        \" &&
        echo 'Deploying...' &&
        cd /app &&
        npx hardhat compile &&
        npx hardhat run scripts/deploy.js --network localhost
      "
    restart: "no"


  api:
    build: ./api
    container_name: eventlog-api
    env_file: .env
    environment:
      RPC_URL: http://hardhat:8545
      ARTIFACT_PATH: /artifacts/contracts/EventLog.sol/EventLog.json
      DEPLOYED_JSON_PATH: /artifacts/deployed.json
      # CONTRACT_ADDRESS: (optional override)  <-- if put here then remove from .env
    volumes:
      - ./hardhat/artifacts:/artifacts:ro
    ports:
      - "8000:8000"
    entrypoint: ["/app/entrypoint.sh"]
    depends_on:
      - hardhat
      - deployer
    networks:
      - pocnet
    restart: unless-stopped

networks:
  pocnet:
    driver: bridge
